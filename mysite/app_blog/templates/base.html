<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Blog{% endblock %}</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        header {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: white;
            padding: 25px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left h1 {
            font-size: 28px;
        }

        .nav-right a {
            color: white;
            text-decoration: none;
            margin-left: 18px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-right a:hover {
            opacity: 0.8;
        }

        .container {
            width: 92%;
            max-width: 1300px;
            margin: 35px auto;
        }

        .hero {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 50px;
            border-radius: 20px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(37,99,235,0.25);
        }

        .hero h2 {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 35px;
        }

        .categories a {
            background: white;
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            color: #1e293b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: 0.2s;
        }

        .categories a:hover {
            transform: translateY(-2px);
            background: #2563eb;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(320px,1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transition: 0.25s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.12);
        }

        .card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-body {
            padding: 22px;
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        .card p {
            color: #4b5563;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 10px 18px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .detail-image {
            width: 100%;
            border-radius: 16px;
            margin: 15px 0;
            max-height: 450px;
            object-fit: cover;
        }

        footer {
            margin-top: 50px;
            padding: 25px;
            text-align: center;
            color: #6b7280;
        }
    </style>
</head>
<body>

<header>
    <div class="nav">
        <div class="nav-left">
            <h1>My Blog</h1>
        </div>

        <div class="nav-right">
            <a href="{% url 'home' %}">Головна</a>
            <a href="{% url 'articles-list' %}">Статті</a>
            <a href="/admin/">Адмінка</a>
        </div>
    </div>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    Django Blog © 2026
</footer>

</body>
</html>
