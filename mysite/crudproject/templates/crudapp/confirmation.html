{% extends 'layout.html' %}

{% block content %}

<p>Ви дійсно хочете видалити замовлення "{{ order }}"?</p>

<form method="post">
    {% csrf_token %}

</form>

<a href="{% url 'show_orders' %}">Скасувати</a>
{% endblock %}
